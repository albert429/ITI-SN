<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg fm-navbar navbar-dark py-0">
        <div class="container">
            <a class="navbar-brand py-2 d-flex align-items-center gap-2" href="index.html">
                <span>🛒</span>
                <span>FreshMart</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link px-3 active" aria-current="page"
                            href="contact.html">Contact</a>
                    </li>
                    <li class="nav-item"><a class="nav-link px-3" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="offers.html">Offers</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="products.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <h1 class="text-center mb-4">Get in Touch</h1>

            <section class="card fm-card border-0 mx-auto fm-form-card">
                <div class="card-body p-4 p-md-5">
                    <form action="#" method="post" autocomplete="on">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Name</label>
                            <input id="name" name="name" type="text" class="form-control form-control-lg"
                                placeholder="Your Name" required />
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <input id="email" name="email" type="email" class="form-control form-control-lg"
                                placeholder="Your Email" required />
                        </div>

                        <div class="mb-4">
                            <label for="message" class="form-label fw-semibold">Message</label>
                            <textarea id="message" name="message" rows="6" class="form-control form-control-lg"
                                required></textarea>
                        </div>

                        <button type="submit" class="btn btn-fm-cart w-100 py-3">Send Message</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <footer class="fm-footer">All rights reserved. &copy; 2024</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
