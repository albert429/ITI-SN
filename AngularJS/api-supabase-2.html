<!DOCTYPE html>
<html ng-app="productApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .page-wrap {
            max-width: 980px;
        }
    </style>
</head>

<body ng-controller="ProductController" class="text-dark">

    <div class="container py-5 page-wrap">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0">Products Management</h2>
            <span class="badge text-bg-secondary fs-6">{{ products.length || 0 }} Products</span>
        </div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-header bg-white py-3">
                <strong>{{ isEdit ? 'Edit Product' : 'Add New Product' }}</strong>
            </div>

            <div class="card-body">
                <form name="productForm" ng-submit="productForm.$valid && (isEdit ? updateProduct() : addProduct())"
                    novalidate class="row g-3 align-items-end">

                    <div class="col-md-6">
                        <label class="form-label" for="name">Name</label>
                        <input id="name" class="form-control" type="text" name="name" ng-model="formProduct.name"
                            required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="price">Price</label>
                        <input id="price" class="form-control" type="number" name="price" ng-model="formProduct.price"
                            min="0" step="0.01" required>
                    </div>

                    <div class="col-md-2 d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100" ng-disabled="productForm.$invalid || loading">
                            {{ isEdit ? 'Update' : 'Add' }}
                        </button>

                        <button type="button" class="btn btn-outline-secondary" ng-if="isEdit" ng-click="cancelEdit()"
                            ng-disabled="loading">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="alert alert-danger" role="alert" ng-if="errorMessage">
            {{ errorMessage }}
        </div>

        <div ng-if="loading" class="d-flex align-items-center text-secondary gap-2 mb-3">
            <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
            <span>Loading products...</span>
        </div>

        <div ng-if="!loading" class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <strong>Product List</strong>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th class="text-end pe-3">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr ng-repeat="product in products">
                            <td class="ps-3">{{ product.id }}</td>
                            <td>{{ product.name }}</td>
                            <td>{{ product.price | currency }}</td>
                            <td class="text-end pe-3">
                                <button class="btn btn-sm btn-outline-primary me-2" ng-click="editProduct(product)"
                                    ng-disabled="loading">
                                    Edit
                                </button>
                                <button class="btn btn-sm btn-outline-danger" ng-click="deleteProduct(product.id)"
                                    ng-disabled="loading">
                                    Delete
                                </button>
                            </td>
                        </tr>

                        <tr ng-if="products.length === 0">
                            <td colspan="4" class="text-center text-muted py-4">No products found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        angular.module("productApp", [])

            .service("ProductService", function ($http) {
                const SUPABASE_KEY = 'sb_publishable_82Z8ZOYO4ZVKWQtMSjI1ng_r2eDXfAc';
                const SUPABASE_URL = 'https://tckthreaprjkcuonolel.supabase.co';
                var API_URL = SUPABASE_URL + "/rest/v1/products";

                var config = {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": "Bearer " + SUPABASE_KEY,
                        "Content-Type": "application/json"
                    }
                };

                this.getProducts = function () {
                    return $http.get(API_URL + "?select=*&order=id.asc", config);
                };

                this.createProduct = function (product) {
                    return $http.post(API_URL, product, config);
                };

                this.updateProduct = function (product) {
                    var payload = {
                        name: product.name,
                        price: product.price
                    };
                    return $http.put(API_URL + "?id=eq." + product.id, payload, config);
                };

                this.deleteProduct = function (id) {
                    return $http.delete(API_URL + "?id=eq." + id, config);
                };
            })

            .controller("ProductController", function ($scope, ProductService) {
                $scope.products = [];
                $scope.formProduct = {};
                $scope.isEdit = false;
                $scope.loading = false;
                $scope.errorMessage = "";

                $scope.clearError = function () {
                    $scope.errorMessage = "";
                };

                $scope.handleError = function (action, error) {
                    var details = error && error.data && error.data.message ? " - " + error.data.message : "";
                    $scope.errorMessage = "Failed to " + action + details;
                };

                $scope.loadProducts = function () {
                    $scope.loading = true;
                    $scope.clearError();

                    ProductService.getProducts()
                        .then(function (response) {
                            $scope.products = response.data;
                        })
                        .catch(function (error) {
                            $scope.handleError("load products", error);
                        })
                        .finally(function () {
                            $scope.loading = false;
                        });
                };

                $scope.addProduct = function () {
                    $scope.loading = true;
                    $scope.clearError();

                    ProductService.createProduct($scope.formProduct)
                        .then(function () {
                            $scope.formProduct = {};
                            return ProductService.getProducts();
                        })
                        .then(function (response) {
                            $scope.products = response.data;
                        })
                        .catch(function (error) {
                            $scope.handleError("add product", error);
                        })
                        .finally(function () {
                            $scope.loading = false;
                        });
                };

                $scope.editProduct = function (product) {
                    $scope.isEdit = true;
                    $scope.clearError();
                    $scope.formProduct = angular.copy(product);
                };

                $scope.updateProduct = function () {
                    $scope.loading = true;
                    $scope.clearError();

                    ProductService.updateProduct($scope.formProduct)
                        .then(function () {
                            $scope.formProduct = {};
                            $scope.isEdit = false;
                            return ProductService.getProducts();
                        })
                        .then(function (response) {
                            $scope.products = response.data;
                        })
                        .catch(function (error) {
                            $scope.handleError("update product", error);
                        })
                        .finally(function () {
                            $scope.loading = false;
                        });
                };

                $scope.deleteProduct = function (id) {
                    if (!confirm("Are you sure?")) {
                        return;
                    }

                    $scope.loading = true;
                    $scope.clearError();

                    ProductService.deleteProduct(id)
                        .then(function () {
                            return ProductService.getProducts();
                        })
                        .then(function (response) {
                            $scope.products = response.data;
                        })
                        .catch(function (error) {
                            $scope.handleError("delete product", error);
                        })
                        .finally(function () {
                            $scope.loading = false;
                        });
                };

                $scope.cancelEdit = function () {
                    $scope.isEdit = false;
                    $scope.formProduct = {};
                    $scope.clearError();
                };

                $scope.loadProducts();
            });
    </script>

</body>

</html>
