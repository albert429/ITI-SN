<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Produce</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="site-nav">
        <ul class="nav-list">
            <li class="nav-logo">
                <img src="https://www.w3schools.com/images/w3schools_logo_436_2.png" alt="FreshMart" width="104"
                    height="50">
            </li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="offers.html">Offers</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="Lab1.html">Home</a></li>
        </ul>
    </nav>

    <main class="page">
        <p class="breadcrumb">Home &gt; Fresh Produce</p>
        <h1 class="page-title">Fresh Fruits &amp; Vegetables</h1>

        <section class="products-grid">
            <article class="product-card">
                <span class="badge badge-blue">ORGANIC</span>
                <div class="product-emoji">🍎</div>
                <h3 class="product-name">Red Apples</h3>
                <p class="product-price">$2.99 <span class="muted">/ lb</span></p>
                <button class="cart-btn" type="button">Add to Cart</button>
            </article>

            <article class="product-card">
                <div class="product-emoji">🍌</div>
                <h3 class="product-name">Ripe Bananas</h3>
                <p class="product-price">$0.59 <span class="muted">/ lb</span></p>
                <button class="cart-btn" type="button">Add to Cart</button>
            </article>

            <article class="product-card">
                <span class="badge badge-red">SALE</span>
                <div class="product-emoji">🥦</div>
                <h3 class="product-name">Broccoli</h3>
                <p class="product-price"><span class="old-price">$1.99</span><span class="sale-price">$1.49</span><span
                        class="muted">/ lb</span></p>
                <button class="cart-btn" type="button">Add to Cart</button>
            </article>

            <article class="product-card">
                <div class="product-emoji">🥕</div>
                <h3 class="product-name">Baby Carrots</h3>
                <p class="product-price">$1.25 <span class="muted">/ bag</span></p>
                <button class="cart-btn" type="button">Add to Cart</button>
            </article>
        </section>
    </main>

    <footer class="site-footer">All rights reserved. &copy; 2024</footer>
</body>

</html>
